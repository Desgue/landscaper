<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Greenprint — Free Online Garden Planner & AI Landscape Visualizer</title>
    <meta name="description" content="Draw your yard layout, upload a photo, and generate a realistic AI landscape image — free, no signup, runs in your browser. Try Greenprint now." />
    <meta name="theme-color" content="#2D6A4F" />
    <link rel="canonical" href="https://greenprint.app/" />
    <link rel="preload" href="/fonts/inter-latin.woff2" as="font" type="font/woff2" crossorigin />

    <!-- Open Graph -->
    <meta property="og:title" content="Greenprint — Free Online Garden Planner & AI Landscape Visualizer" />
    <meta property="og:description" content="Draw your yard layout, upload a photo, and generate a realistic AI landscape image — free, no signup, runs in your browser. Try Greenprint now." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://greenprint.app/" />
    <meta property="og:site_name" content="Greenprint" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Greenprint — Free Online Garden Planner & AI Landscape Visualizer" />
    <meta name="twitter:description" content="Draw your yard layout, upload a photo, and generate a realistic AI landscape image — free, no signup, runs in your browser. Try Greenprint now." />

    <!-- Structured Data: SoftwareApplication -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Greenprint",
      "applicationCategory": "DesignApplication",
      "operatingSystem": "Web Browser",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "description": "Free browser-based garden and landscape planner with AI image generation. Draw your yard layout and generate realistic landscape renderings.",
      "url": "https://greenprint.app"
    }
    </script>

    <!-- Structured Data: FAQPage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Is Greenprint really free?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. Greenprint is 100% free with no signup, no trial period, and no watermarks. Create unlimited plans and generate images at no cost."
          }
        },
        {
          "@type": "Question",
          "name": "Do I need to install anything?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No. Greenprint runs entirely in your web browser. No downloads or installations required."
          }
        },
        {
          "@type": "Question",
          "name": "Is my data private?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Your plans are stored locally in your browser. Images are generated on our servers and immediately discarded. We never store your data."
          }
        }
      ]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
